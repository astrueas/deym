<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untuk Pacarnya Aku</title>
    <style>
        body {
            background-color: #ffe6f2; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(255, 105, 180, 0.2);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        h1 {
            color: #ff4d94;
            font-size: 26px;
            margin-bottom: 10px;
        }
        p {
            color: #555;
            font-size: 18px;
            margin-bottom: 25px;
        }
        button {
            background-color: #ff4d94;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        button:hover {
            background-color: #ff1a75;
            transform: translateY(-2px);
            box-shadow: 0 6px 10px rgba(0,0,0,0.15);
        }
        #pesanRahasia {
            display: none; 
            margin-top: 30px;
            font-size: 18px;
            color: #d63384;
            font-weight: 600;
            line-height: 1.6;
            background-color: #fff0f5;
            padding: 20px;
            border-radius: 15px;
            border: 2px dashed #ffb3d9;
            animation: fadeIn 0.8s ease-in-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>HALLOW PACARRNYAA AKUU</h1>
        <p>beso mau interview kerja yaa?? </p>
        
        <button id="tombolPencet" onclick="tampilkanPesan()">Klik di sini</button>
        
        <div id="pesanRahasia">
            semangatt sayangg,<br>
            aku bantuin dari sini, bantu do'a hehe,<br>
            pokokna goodluck buat kamuu sayangg,<br>
            love youu more
        </div>
    </div>

    <script>
        function tampilkanPesan() {
            document.getElementById('pesanRahasia').style.display = 'block';
            document.getElementById('tombolPencet').style.display = 'none';
        }
    </script>

</body>
</html>
